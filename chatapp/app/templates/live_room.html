<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-purple-600 p-4 text-white flex justify-between items-center shadow-md">
        <a href="{{ url_for('chat.live_room_home') }}" class="text-white font-bold">&larr; Leave</a>
        <span class="font-bold text-xl">Room: {{ room_id }}</span>
        <span class="w-10"></span>
    </header>

    <div class="bg-white p-3 border-b shadow-sm">
        <p class="text-sm text-gray-600 font-semibold mb-1">Active Users:</p>
        <div id="user-list" class="flex flex-wrap gap-2"></div>
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <div class="p-4 bg-white border-t flex items-center shadow-lg">
        <input id="messageInput" type="text" placeholder="Type a message..."
            class="flex-1 border rounded-full px-4 py-2 outline-none focus:ring-2 focus:ring-purple-400">
        <button onclick="sendMessage()" class="ml-3 bg-purple-600 text-white px-6 py-2 rounded-full hover:bg-purple-700 transition">
            Send
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        var currentUser = "{{ username }}";
        var roomId = "{{ room_id }}";

        // live room e join kora hocche
        socket.emit('live_join', { 'room_id': roomId, 'username': currentUser });

        function sendMessage() {
            var input = document.getElementById("messageInput");
            var message = input.value;

            if (message.trim() !== "") {
                socket.emit('live_message', {
                    'message': message,
                    'sender': currentUser,
                    'room_id': roomId
                });
                input.value = "";
            }
        }

        var inputBox = document.getElementById("messageInput");
        inputBox.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        // active user list update
        socket.on('live_user_list', function(data) {
            var userList = document.getElementById("user-list");
            userList.innerHTML = "";

            var users = data.users;
            var i = 0;
            while (i < users.length) {
                var tag = document.createElement("span");
                tag.className = "bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm";
                tag.innerText = users[i];
                userList.appendChild(tag);
                i = i + 1;
            }
        });

        // notun user joined
        socket.on('live_user_joined', function(data) {
            addSystemMessage(data.username + " joined the room");
        });

        // user left
        socket.on('live_user_left', function(data) {
            addSystemMessage(data.username + " left the room");
        });

        // system message dekhanor function
        function addSystemMessage(text) {
            var chatContainer = document.getElementById("chat-container");
            var msgElement = document.createElement("div");
            msgElement.className = "text-center text-sm text-gray-400";
            msgElement.innerText = text;
            chatContainer.appendChild(msgElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // live message ashle
        socket.on('live_message', function(data) {
            var chatContainer = document.getElementById("chat-container");
            var msgElement = document.createElement("div");

            var isMe = data.sender === currentUser;

            if (isMe) {
                msgElement.className = "p-3 rounded-lg w-fit max-w-md bg-purple-600 text-white ml-auto";
            } else {
                msgElement.className = "p-3 rounded-lg w-fit max-w-md bg-white border";
            }

            msgElement.innerHTML = "<strong>" + data.sender + ":</strong> " + data.message;

            chatContainer.appendChild(msgElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        // tab/browser close howar agee leave event pathano
        window.addEventListener('beforeunload', function() {
            socket.emit('live_leave', { 'room_id': roomId, 'username': currentUser });
        });
    </script>
</body>
</html>
