<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }

        .chat-area {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .back-btn {
            display: block;
        }

        @media (min-width: 768px) {
            .sidebar {
                width: 320px;
                flex-shrink: 0;
            }

            .chat-area {
                display: block;
                flex: 1;
            }

            .back-btn {
                display: none;
            }
        }

        .sidebar.mobile-hide {
            display: none;
        }

        .chat-area.mobile-show {
            display: block;
            flex: 1;
        }

        .chat-iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="sidebar" class="sidebar bg-white border-r flex flex-col">

            <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
                <span class="font-bold text-lg">{{ name }}</span>
                <a href="{{ url_for('auth.logout') }}" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-semibold">
                    Logout
                </a>
            </div>

            <div class="p-3 space-y-2 border-b">
                <button onclick="openChat('/open-chat')"
                    class="w-full bg-blue-500 text-white py-2 rounded-lg font-semibold">
                    Open Chat (General)
                </button>
                <button onclick="openChat('/live-room')"
                    class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold">
                    Live Room
                </button>
            </div>

            <div class="p-3 border-b">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-gray-700">Groups</span>
                    <button onclick="openChat('/groups')"
                        class="bg-green-600 text-white px-3 py-1 rounded text-sm">
                        + New
                    </button>
                </div>

                {% for group in my_groups %}
                    <div onclick="openChat('/group/{{ group.id }}')"
                        class="p-2 mb-1 rounded bg-gray-100 hover:bg-gray-200 cursor-pointer">
                        {{ group.name }}
                    </div>
                {% endfor %}

                {% if my_groups|length == 0 %}
                    <p class="text-sm text-gray-400">No groups yet</p>
                {% endif %}
            </div>

            <div class="p-3 border-b">
                <span class="font-bold text-gray-700">Personal Chats</span>

                <form onsubmit="startPersonalChat(event)" class="flex mt-2 mb-2">
                    <input id="newChatUser" type="text" placeholder="Enter username"
                        class="flex-1 border rounded-l px-2 py-1 outline-none focus:ring-2 focus:ring-orange-400">
                    <button type="submit" class="bg-orange-500 text-white px-3 rounded-r">
                        Chat
                    </button>
                </form>

                {% for other_user in personal_chats %}
                    <div onclick="openChat('/personal/{{ other_user }}')"
                        class="p-2 mb-1 rounded bg-gray-100 hover:bg-gray-200 cursor-pointer">
                        {{ other_user }}
                    </div>
                {% endfor %}

                {% if personal_chats|length == 0 %}
                    <p class="text-sm text-gray-400">No personal chats yet</p>
                {% endif %}
            </div>

        </div>

        <div id="chatArea" class="chat-area bg-gray-100">
            <button id="backBtn" class="back-btn absolute top-2 left-2 z-10 bg-white shadow px-3 py-1 rounded"
                onclick="showSidebar()">
                &larr; Back
            </button>
            <iframe id="chatFrame" class="chat-iframe" src="/open-chat"></iframe>
        </div>

    </div>

    <script>
        // sidebar e kono chat e click korle eta call hoy
        function openChat(url) {
            var iframe = document.getElementById('chatFrame');
            iframe.src = url;

            var chatArea = document.getElementById('chatArea');
            var sidebar = document.getElementById('sidebar');

            chatArea.classList.add('mobile-show');
            sidebar.classList.add('mobile-hide');
        }

        // mobile e back button chaple sidebar dekhabe
        function showSidebar() {
            var chatArea = document.getElementById('chatArea');
            var sidebar = document.getElementById('sidebar');

            chatArea.classList.remove('mobile-show');
            sidebar.classList.remove('mobile-hide');
        }

        // ei function ke iframe er bhitor theke call kora jay (back button er jonno)
        window.showSidebar = showSidebar;

        // notun personal chat shuru korar form
        function startPersonalChat(event) {
            event.preventDefault();
            var input = document.getElementById('newChatUser');
            var otherUser = input.value.trim();

            if (otherUser !== "") {
                openChat('/personal/' + otherUser);
                input.value = "";
            }
        }
    </script>

</body>
</html>
