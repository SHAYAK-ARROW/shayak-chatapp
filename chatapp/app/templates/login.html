<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-80">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">Login</h1>

        {% if error %}
        <p class="text-red-500 text-center mb-4">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required
                class="w-full border rounded px-3 py-2 mb-3 outline-none focus:ring-2 focus:ring-blue-400">

            <input type="password" name="password" placeholder="Password" required
                class="w-full border rounded px-3 py-2 mb-4 outline-none focus:ring-2 focus:ring-blue-400">

            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Login
            </button>
        </form>

        <p class="text-center mt-4 text-sm">
            Don't have an account?
            <a href="{{ url_for('auth.signup') }}" class="text-blue-600 font-semibold">Sign Up</a>
        </p>
    </div>

</body>
</html>
